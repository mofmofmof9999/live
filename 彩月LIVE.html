    animation:bounce 4.5s ease-in-out infinite;
    transform-origin:50% 40%;
  }
  /* 彩月は深月より少し元気に弾む */
  @keyframes bounce{
    0%,100%{transform:scale(1.03) translateY(0) rotate(0);}
    25%{transform:scale(1.06) translateY(-9px) rotate(.6deg);}
    50%{transform:scale(1.095) translateY(-15px) rotate(0);}
    75%{transform:scale(1.06) translateY(-9px) rotate(-.6deg);}
  }
  #stage::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(60,25,45,.38) 0%,transparent 16%,transparent 64%,rgba(60,25,45,.55) 100%);}
  /* ===== キラキラ ===== */
  .spark{position:absolute;z-index:3;color:#ffe9a8;pointer-events:none;
    animation:twinkle 2.4s ease-in-out infinite;text-shadow:0 0 7px #ffd98a;}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.7) rotate(0);}50%{opacity:1;transform:scale(1.2) rotate(20deg);}}
  /* ===== 上部バー ===== */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:center;gap:8px;padding:14px 12px;}
  #hostchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.38);
    border:1px solid rgba(232,199,127,.9);border-radius:999px;padding:4px 6px 4px 4px;backdrop-filter:blur(8px);}
  #hostchip img{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);}
  #hostname{color:#5c2540;font-size:14px;font-weight:800;line-height:1.1;}
  #hostsub{color:#8a4a68;font-size:10px;font-weight:600;}
  #followbtn{background:linear-gradient(135deg,#f78fb5,#e0608f);color:#fff;border:none;
    font-size:12px;font-weight:700;border-radius:999px;padding:7px 14px;margin-left:2px;
    box-shadow:0 2px 8px rgba(224,96,143,.4);}
  #followbtn.done{background:rgba(255,255,255,.55);color:#b0577d;box-shadow:none;}
  #viewers{margin-left:auto;display:flex;align-items:center;gap:6px;}
  #viewers .pill{background:rgba(0,0,0,.35);color:#fff;font-size:11px;border-radius:8px;
    padding:5px 8px;backdrop-filter:blur(6px);}
  #livebadge{background:var(--heart);color:#fff;font-size:10px;font-weight:800;
    letter-spacing:.08em;border-radius:6px;padding:4px 7px;}
  /* ===== ピン留め ===== */
  #pinned{position:absolute;top:66px;left:12px;z-index:10;max-width:78%;transition:opacity .45s ease;
    background:linear-gradient(135deg,rgba(255,232,240,.9),rgba(255,214,229,.9));
    border:1px solid rgba(232,199,127,.95);border-radius:14px;padding:8px 11px;
    color:#5c2540;font-size:12px;font-weight:600;line-height:1.5;backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(224,96,143,.25);}
  #pinned b{color:#c9752f;font-size:10.5px;display:block;margin-bottom:2px;letter-spacing:.05em;}
  /* ===== コメント欄 ===== */
  #comments{position:absolute;left:10px;bottom:74px;z-index:10;width:72%;
    display:flex;flex-direction:column;gap:7px;
    -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 18%);
    mask-image:linear-gradient(180deg,transparent 0,#000 18%);}
  .cmt{display:flex;gap:7px;align-items:flex-start;animation:pop .45s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.92);}to{opacity:1;transform:none;}}
  .cmt .ic{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;
    justify-content:center;font-size:13px;background:var(--c,#f78fb5);}
  .cmt .body{background:rgba(0,0,0,.4);border-radius:12px;padding:5px 10px;backdrop-filter:blur(4px);}
  .cmt .u{color:#ffd3e3;font-size:10.5px;font-weight:600;}
  .cmt .t{color:#fff;font-size:12.5px;line-height:1.45;}
  .cmt.join .body{background:rgba(247,143,181,.4);border:1px solid rgba(255,211,227,.6);}
  .cmt.join .t{color:#ffeef5;font-size:11.5px;}
  .cmt.gift .body{background:linear-gradient(135deg,rgba(232,199,127,.4),rgba(0,0,0,.42));
    border:1px solid rgba(232,199,127,.75);}
  /* ===== 右側アクション ===== */
  #actions{position:absolute;right:8px;bottom:86px;z-index:10;
    display:flex;flex-direction:column;gap:24px;align-items:center;}
  .act{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.38);
    display:flex;align-items:center;justify-content:center;font-size:21px;
    backdrop-filter:blur(6px);border:none;color:#fff;}
  .actwrap small{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);
    white-space:nowrap;color:#fff;font-size:11px;font-weight:700;
    background:rgba(0,0,0,.7);padding:2px 9px;border-radius:999px;backdrop-filter:blur(4px);}
  .actwrap{position:relative;}
  #heartbtn:active{transform:scale(.85);}
  /* ===== 浮かぶハート ===== */
  .float{position:absolute;z-index:9;pointer-events:none;font-size:24px;
    animation:floatup 2.4s ease-out forwards;filter:drop-shadow(0 0 5px rgba(255,140,180,.7));}
  @keyframes floatup{
    0%{opacity:0;transform:translateY(0) scale(.5);}
    12%{opacity:1;transform:translateY(-30px) scale(1.1) rotate(10deg);}
    100%{opacity:0;transform:translateY(-340px) scale(.9) rotate(-12deg);}
  }
  /* ===== 下部バー ===== */
  #bottombar{position:absolute;left:0;right:0;bottom:0;z-index:10;
    display:flex;gap:10px;align-items:center;padding:12px 12px calc(12px + env(safe-area-inset-bottom));}
  #fakeinput{flex:1;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);
    color:#ffe4ee;font-size:13px;border-radius:999px;padding:10px 16px;backdrop-filter:blur(6px);}

  /* ===== キャラレイヤー(分離モード) ===== */
  #chara{position:absolute;left:50%;bottom:0;z-index:1;width:100%;max-height:100%;
    object-fit:contain;object-position:bottom;display:none;
    transform:translateX(-50%);transform-origin:bottom center;}
  #chara.on{display:block;animation:charabreathe 4s ease-in-out infinite;}
  @keyframes charabreathe{
    0%,100%{transform:translateX(-50%) translateY(0) scale(1);}
    50%{transform:translateX(-50%) translateY(-11px) scale(1.012);}
  }
  @keyframes bgdrift{from{transform:scale(1.0);}to{transform:scale(1.035);}}
  /* ===== 動画キャラレイヤー(クロマキー合成) ===== */
  #characanvas{position:absolute;left:50%;bottom:0;z-index:1;width:100%;max-height:100%;
    object-fit:contain;object-position:bottom;display:none;transform:translateX(-50%);}
  #characanvas.onv{display:block;}
  #tapstart{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);color:#fff;font-size:15px;font-weight:700;}
  #tapstart.show{display:flex;}
  /* ===== クロマキー調整デバッグパネル ===== */
  #kdebug{position:absolute;top:130px;right:8px;z-index:40;background:rgba(0,0,0,.78);color:#7dff7d;
    font-size:11px;font-family:monospace;padding:8px 10px;border-radius:10px;max-width:190px;}
  #kdebug button{margin:5px 5px 0 0;font-size:11px;padding:5px 10px;border:none;border-radius:6px;}
  #kdhint{color:#fff;margin-top:5px;font-size:10px;line-height:1.4;}
</style>
</head>
<body>
<div id="stage">
  <div id="bg"></div>
  <img id="chara" alt="">
  <canvas id="characanvas"></canvas>
  <div id="tapstart">タップして配信スタート ▶</div>

<script>
const stage=document.getElementById('stage');

/* ---- キラキラ配置 ---- */
for(let i=0;i<14;i++){
  const s=document.createElement('span');
  s.className='spark';s.textContent=Math.random()<.5?'✦':'⭐';
  s.style.left=(Math.random()*92+2)+'%';
  s.style.top=(Math.random()*55+3)+'%';
  s.style.fontSize=(Math.random()*8+6)+'px';
  s.style.animationDelay=(Math.random()*2.4)+'s';
  stage.appendChild(s);
}

/* ---- コメントデータ ---- */
const users=[
  ["さちこ","🌸","#f78fb5"],["hikari_25","☀️","#e8b95f"],["カフェ好き","☕","#c98f6f"],
  ["momo*","🍑","#f5a08a"],["ぴよまる","🐣","#e8c75f"],["star_gazer","🌟","#b58fd6"],
  ["natsu","🌻","#e8a84f"],["ゆるふわ勢","🧸","#d69f8f"],["mint_chan","🍀","#7bbfa3"],["きらり","💎","#8fb5e0"]
];
const msgs=[
  "さっちゃんきたー!💖","YouTube開設おめでとう🎉","配信で会えるの嬉しい!","初配信ですか?かわいい〜",
  "動画から辿ってきました!","声あかるくて元気でる","初見です!よろしくお願いします","登録したよ💖",
  "深月さまの動画も見てます","カフェの話きかせて☕","占いチャンネル待ってました!","テンションあがる〜⭐",
  "フォローしたよ💖","占いもやってるの?","今日なに話すの?","元気もらった、ありがと!"
];
const joins=["さんが参加しました","さんが参加しました","さんがフォローしました💖"];
const gifts=["⭐ おほしさま を贈りました","🌈 にじ を贈りました","🍰 ケーキ を贈りました"];

const cbox=document.getElementById('comments');
function addComment(){
  const [u,ic,c]=users[Math.floor(Math.random()*users.length)];
  const r=Math.random();
  const d=document.createElement('div');
  let cls='cmt',text;
  if(r<.12){cls+=' join';text=u+joins[Math.floor(Math.random()*joins.length)];}
  else if(r<.2){cls+=' gift';text=u+"さんが "+gifts[Math.floor(Math.random()*gifts.length)];burst(3);}
  else{text=msgs[Math.floor(Math.random()*msgs.length)];}
  d.className=cls;
  d.innerHTML='<div class="ic" style="--c:'+c+'">'+ic+'</div><div class="body">'+
    (cls.includes('join')||cls.includes('gift')?'':'<div class="u">'+u+'</div>')+
    '<div class="t">'+text+'</div></div>';
  cbox.appendChild(d);
  while(cbox.children.length>7)cbox.removeChild(cbox.firstChild);
}
setInterval(addComment,1400);
addComment();addComment();

/* ---- 浮かぶハート(彩月は明るめ多め) ---- */
const symbols=["💖","💖","⭐","🌟","💛","✨","🤍"];
function heart(){
  const h=document.createElement('span');
  h.className='float';
  h.textContent=symbols[Math.floor(Math.random()*symbols.length)];
  h.style.right=(14+Math.random()*36)+'px';
  h.style.bottom=(120+Math.random()*30)+'px';
  h.style.fontSize=(18+Math.random()*14)+'px';
  stage.appendChild(h);
  setTimeout(()=>h.remove(),2500);
}
function burst(n){for(let i=0;i<n;i++)setTimeout(heart,i*120);}
setInterval(()=>{if(Math.random()<.85)heart();},600);

/* ---- タップでハート ---- */
let likes=41000;
const lc=document.getElementById('likecount');
function fmt(n){return n>=10000?(n/10000).toFixed(1)+'万':n.toLocaleString();}
document.getElementById('heartbtn').addEventListener('click',()=>{burst(4);likes+=Math.floor(Math.random()*5+3);lc.textContent=fmt(likes);});
stage.addEventListener('dblclick',()=>burst(5));

/* ---- 視聴者数のゆらぎ ---- */
let viewers=1382;
const vc=document.getElementById('vcount');
setInterval(()=>{
  viewers+=Math.floor(Math.random()*19-7);
  if(viewers<1200)viewers=1200+Math.floor(Math.random()*40);
  vc.textContent=viewers.toLocaleString();
  likes+=Math.floor(Math.random()*9);lc.textContent=fmt(likes);
},2000);

/* ---- フォローボタン ---- */
const fb=document.getElementById('followbtn');
fb.addEventListener('click',()=>{fb.textContent='フォロー中';fb.classList.add('done');burst(6);});

/* ---- レイヤー分離モード(?bg=xxx.jpg&chara=xxx.png) ---- */
const P=new URLSearchParams(location.search);
if(P.get('ui')==='0'){document.getElementById('actions').style.display='none';}
if(P.get('input')==='0'){document.getElementById('bottombar').style.display='none';}
const bgEl=document.getElementById('bg');

/* ---- UIの部分非表示(YouTube等の自前UIと被る場合) ---- */
/* ?ui=0 で右側アクション(ハート/ギフト/シェア)を非表示 */
if(P.get('ui')==='0'){document.getElementById('actions').style.display='none';}
/* ?input=0 で下部のコメント入力バーを非表示 */
if(P.get('input')==='0'){document.getElementById('bottombar').style.display='none';}
if(P.get('bg')){bgEl.style.backgroundImage='url("'+P.get('bg')+'")';}
if(P.get('chara')){
  const c=document.getElementById('chara');
  c.src=P.get('chara');c.classList.add('on');
  bgEl.style.animation='bgdrift 30s ease-in-out infinite alternate';
}

/* ---- 動画キャラモード(?charavideo=xxx.mp4&key=00ff00&tol=110) ---- */
if(P.get('charavideo')){
  const v=document.createElement('video');
  v.src=P.get('charavideo');
  v.muted=true;v.loop=true;v.playsInline=true;v.setAttribute('playsinline','');v.crossOrigin='anonymous';
  const cv=document.getElementById('characanvas');
  cv.classList.add('onv');
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  const kh=(P.get('key')||'00ff00').replace('#','');
  let kr=parseInt(kh.substr(0,2),16),kg=parseInt(kh.substr(2,2),16),kb=parseInt(kh.substr(4,2),16);
  let tol=parseInt(P.get('tol')||'110');
  const vwf=Math.min(1,Math.max(.2,parseFloat(P.get('vw')||'1')));
  let sx=0,sw=0;
  v.addEventListener('loadedmetadata',()=>{
    sw=v.videoWidth*vwf;sx=(v.videoWidth-sw)/2;
    cv.width=sw;cv.height=v.videoHeight;
  });
  function draw(){
    if(v.readyState>=2&&cv.width>0){
      ctx.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const f=ctx.getImageData(0,0,cv.width,cv.height),d=f.data;
      /* 優勢度方式: キー色の最強チャンネルが他よりどれだけ強いかで判定 */
      let dc=1;
      if(kr>=kg&&kr>=kb)dc=0; else if(kb>=kr&&kb>=kg)dc=2;
      const o1=(dc+1)%3,o2=(dc+2)%3,karr=[kr,kg,kb];
      const keyDom=karr[dc]-Math.max(karr[o1],karr[o2]);
      if(keyDom>10){
        const tHigh=keyDom*.55*(110/Math.max(tol,20));
        const tLow=tHigh*.55;
        for(let i=0;i<d.length;i+=4){
          const pd=d[i+dc],pm=Math.max(d[i+o1],d[i+o2]);
          const dom=pd-pm;
          if(dom>=tHigh){d[i+3]=0;}
          else if(dom>tLow){d[i+3]=255*(1-(dom-tLow)/(tHigh-tLow));d[i+dc]=pm;}
          else if(dom>0){d[i+dc]=pm;} /* 縁の色かぶりを自動補正 */
        }
      }else{
        /* キー色に優勢チャンネルがない場合は旧・色距離方式 */
        for(let i=0;i<d.length;i+=4){
          const dr=d[i]-kr,dg=d[i+1]-kg,db=d[i+2]-kb;
          const dist=Math.sqrt(dr*dr+dg*dg+db*db);
          if(dist<tol){d[i+3]=0;}
          else if(dist<tol*1.35){d[i+3]=(dist-tol)/(tol*.35)*255;}
        }
      }
      ctx.putImageData(f,0,0);
    }
    requestAnimationFrame(draw);
  }
  /* ---- デバッグモード(?debug=1): 残った緑をタップしてkey色を採取 ---- */
  if(P.get('debug')){
    const dbg=document.createElement('div');dbg.id='kdebug';
    dbg.innerHTML='<span id="kdinfo"></span><br><button id="kdm">tol−15</button><button id="kdp">tol+15</button>'+
      '<div id="kdhint">キャラ以外の残った緑をタップ→その色がkeyになる。決まったらURLに key=/tol= を書き写す</div>';
    stage.appendChild(dbg);
    const info=()=>{document.getElementById('kdinfo').textContent=
      'key='+[kr,kg,kb].map(x=>x.toString(16).padStart(2,'0')).join('')+' tol='+tol;};
    info();
    document.getElementById('kdm').onclick=()=>{tol=Math.max(20,tol-15);info();};
    document.getElementById('kdp').onclick=()=>{tol+=15;info();};
    cv.addEventListener('click',e=>{
      const r=cv.getBoundingClientRect();
      const scale=Math.min(r.width/cv.width,r.height/cv.height);
      const ox=(r.width-cv.width*scale)/2,oy=(r.height-cv.height*scale);
      const x=Math.floor((e.clientX-r.left-ox)/scale),y=Math.floor((e.clientY-r.top-oy)/scale);
      if(x<0||y<0||x>=cv.width||y>=cv.height)return;
      const t=document.createElement('canvas');t.width=cv.width;t.height=cv.height;
      const tc=t.getContext('2d');
      tc.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const px=tc.getImageData(x,y,1,1).data;
      kr=px[0];kg=px[1];kb=px[2];info();
    });
  }
  const ts=document.getElementById('tapstart');
  v.play().catch(()=>{
    ts.classList.add('show');
    ts.addEventListener('click',()=>{v.play();ts.classList.remove('show');},{once:true});
  });
  draw();
  bgEl.style.animation='bgdrift 30s ease-in-out infinite alternate';
}

/* ---- ピン留めセリフのローテーション(?pin=xxx.txt&pindur=8) ---- */
let pins=[
  "はじめまして〜!彩月です⭐ 今日からYouTubeでもお話しすることにしたよ!",
  "配信ちょっと緊張するけど…えへへ、よろしくね💖",
  "登録してくれた人ありがとう!これからいっぱいおしゃべりしよ〜",
  "コメントぜんぶ読むから、気軽に話しかけてね!☕"
];
const pinEl=document.getElementById('pinned');
const pinText=document.getElementById('pintext');
const pindur=(parseFloat(P.get('pindur'))||8)*1000;
let pidx=0,pintimer=null;
function setPin(i){
  pidx=(i+pins.length)%pins.length;
  pinEl.style.opacity=0;
  setTimeout(()=>{pinText.textContent=pins[pidx];pinEl.style.opacity=1;},450);
}
function startPinTimer(){
  clearInterval(pintimer);
  if(pins.length>1)pintimer=setInterval(()=>setPin(pidx+1),pindur);
}
if(P.get('pin')){
  fetch(P.get('pin')).then(r=>r.text()).then(t=>{
    const arr=t.replace(/\r/g,'').split('\n').map(s=>s.trim()).filter(Boolean);
    if(arr.length){pins=arr;pidx=0;pinText.textContent=pins[0];startPinTimer();}
  }).catch(()=>{});
}
startPinTimer();
</script>
