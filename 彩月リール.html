<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>彩月 − ひるのおしゃべりリール</title>
<style>
  :root{
    --deep:#fff3f6;
    --deep2:#ffe3ec;
    --gold:#d9a441;
    --goldsoft:rgba(217,164,65,.6);
    --text:#5c2540;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;}
  #stage{position:relative;height:100dvh;max-width:calc(100dvh*9/16);
    margin:0 auto;overflow:hidden;user-select:none;
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, #ffd9e6 0%, transparent 55%),
      radial-gradient(ellipse 80% 40% at 80% 108%, #ffe9c9 0%, transparent 60%),
      linear-gradient(180deg, var(--deep) 0%, #ffeaf1 55%, var(--deep2) 100%);}
  /* 背景画像レイヤー(?bg=指定時のみ) */
  #bg{position:absolute;inset:0;background:center/cover no-repeat;opacity:0;}
  #bg.on{opacity:1;animation:bgdrift 30s ease-in-out infinite alternate;}
  @keyframes bgdrift{from{transform:scale(1.0);}to{transform:scale(1.035);}}
  #bg.on ~ #veil{position:absolute;inset:0;background:rgba(255,244,248,.45);}
  /* 星 */
  .star{position:absolute;z-index:3;color:#f0c46a;pointer-events:none;
    animation:twinkle 4s ease-in-out infinite;text-shadow:0 0 6px #ffd98a;}
  @keyframes twinkle{0%,100%{opacity:.1;transform:scale(.8);}50%{opacity:.8;transform:scale(1.1);}}
  /* ===== スライドカード ===== */
  #slidecard{position:absolute;top:9%;left:8%;right:8%;z-index:10;text-align:center;
    color:var(--text);transition:opacity .6s ease, transform .6s ease;}
  #slidecard.out{opacity:0;transform:translateY(10px);}
  #ornament{color:var(--gold);font-size:13px;letter-spacing:.6em;margin-bottom:14px;}
  #stitle{font-size:24px;font-weight:600;letter-spacing:.14em;line-height:1.6;
    text-shadow:0 1px 10px rgba(255,255,255,.95);}
  #sdivider{width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:16px auto;}
  #sbody{font-size:15.5px;line-height:2.15;letter-spacing:.08em;white-space:pre-line;
    text-shadow:0 1px 8px rgba(255,255,255,.95);}
  /* 進行ドット */
  #dots{position:absolute;top:6%;left:0;right:0;z-index:10;display:flex;gap:7px;justify-content:center;}
  #dots i{width:5px;height:5px;border-radius:50%;background:rgba(217,164,65,.32);transition:.4s;}
  #dots i.on{background:var(--gold);box-shadow:0 0 6px var(--goldsoft);}
  /* ===== キャラレイヤー ===== */
  #chara{position:absolute;left:50%;bottom:0;z-index:5;width:100%;
    max-height:var(--ch,50%);object-fit:contain;object-position:bottom;display:none;
    transform:translateX(-50%);transform-origin:bottom center;
    filter:drop-shadow(0 -4px 30px rgba(224,120,160,.4));}
  #chara.on{display:block;animation:charabreathe 4s ease-in-out infinite;}
  @keyframes charabreathe{
    0%,100%{transform:translateX(-50%) translateY(0) scale(1);}
    50%{transform:translateX(-50%) translateY(-11px) scale(1.012);}
  }
  #characanvas{position:absolute;left:50%;bottom:0;z-index:5;width:100%;
    max-height:var(--ch,50%);object-fit:contain;object-position:bottom;display:none;
    transform:translateX(-50%);}
  #characanvas.onv{display:block;}
  /* ===== 署名 ===== */
  #sig{position:absolute;left:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:11;
    display:flex;align-items:center;gap:8px;}
  #sig img{width:30px;height:30px;border-radius:50%;border:1px solid var(--gold);}
  #signame{color:var(--text);font-size:13px;letter-spacing:.12em;}
  #signame small{display:block;color:var(--goldsoft);font-size:9px;letter-spacing:.2em;margin-top:2px;}
  /* ===== 動画再生タップ促し ===== */
  #tapstart{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);color:#fff;font-size:15px;font-weight:700;font-family:sans-serif;}
  #tapstart.show{display:flex;}
  /* ===== クロマキー調整デバッグ ===== */
  #kdebug{position:absolute;top:130px;right:8px;z-index:40;background:rgba(0,0,0,.78);color:#7dff7d;
    font-size:11px;font-family:monospace;padding:8px 10px;border-radius:10px;max-width:190px;}
  #kdebug button{margin:5px 5px 0 0;font-size:11px;padding:5px 10px;border:none;border-radius:6px;}
  #kdhint{color:#fff;margin-top:5px;font-size:10px;line-height:1.4;}
</style>
</head>

  <div id="bg"></div>

  <div id="dots"></div>
  <div id="slidecard">

  </div>

<script>
const stage=document.getElementById('stage');
const P=new URLSearchParams(location.search);

/* ---- 星 ---- */
for(let i=0;i<18;i++){
  const s=document.createElement('span');
  s.className='star';s.textContent=Math.random()<.35?'✦':'･';
  s.style.left=(Math.random()*94+2)+'%';
  s.style.top=(Math.random()*70+2)+'%';
  s.style.fontSize=(Math.random()*7+5)+'px';
  s.style.animationDelay=(Math.random()*4)+'s';
  stage.appendChild(s);
}

/* ---- スライド ---- */
let slides=[
  {t:"きょうのハッピー占い", b:"朝いちばんに窓をあけて、\n光をたっぷり浴びてみて。\nそれだけで運気は上向きだよ⭐"},
  {t:"カフェ気分の開運アクション", b:"お気に入りのカップで\nあったかい飲みものをひとくち。\nほっとした瞬間に、いい報せは来るの。"},
  {t:"今週のラッキーカラー", b:"ペールゴールド✨\n小物にひとつ足すだけで、\n笑顔の出会いを引き寄せるよ。"}
];
const dur=(parseFloat(P.get('dur'))||6)*1000;
let idx=0,timer=null;
const card=document.getElementById('slidecard');
const dots=document.getElementById('dots');

function renderDots(){
  dots.innerHTML=slides.map((_,i)=>'<i'+(i===idx?' class="on"':'')+'></i>').join('');
}
function show(i,instant){
  idx=(i+slides.length)%slides.length;
  const apply=()=>{
    document.getElementById('stitle').textContent=slides[idx].t;
    document.getElementById('sbody').textContent=slides[idx].b;
    renderDots();
    card.classList.remove('out');
  };
  if(instant){apply();return;}
  card.classList.add('out');
  setTimeout(apply,600);
}
function startTimer(){clearInterval(timer);timer=setInterval(()=>show(idx+1),dur);}

/* スライド定義ファイル(?slides=xxx.txt)。「---」の行で区切り、各ブロック1行目=タイトル */
function parseSlides(text){
  const blocks=text.replace(/\r/g,'').split(/\n\s*---\s*\n/).map(b=>b.trim()).filter(Boolean);
  const arr=blocks.map(b=>{
    const lines=b.split('\n');
    return {t:lines[0].trim(), b:lines.slice(1).join('\n').trim()};
  }).filter(s=>s.t);
  return arr.length?arr:null;
}
if(P.get('slides')){
  fetch(P.get('slides')).then(r=>r.text()).then(t=>{
    const arr=parseSlides(t);
    if(arr){slides=arr;show(0,true);startTimer();}
  }).catch(()=>{});
}
show(0,true);startTimer();
/* カードタップで手動送り */
card.addEventListener('click',()=>{show(idx+1);startTimer();});

/* ---- 背景画像(?bg=) ---- */
const bgEl=document.getElementById('bg');
if(P.get('bg')){bgEl.style.backgroundImage='url("'+P.get('bg')+'")';bgEl.classList.add('on');}

/* ---- キャラの高さ(?ch=0.2〜0.9、デフォルト0.5) ---- */
const ch=Math.min(.9,Math.max(.2,parseFloat(P.get('ch')||'0.5')));
stage.style.setProperty('--ch',(ch*100)+'%');

/* ---- キャラ静止画(?chara=) ---- */
if(P.get('chara')){
  const c=document.getElementById('chara');
  c.src=P.get('chara');c.classList.add('on');
}

/* ---- キャラ動画+クロマキー(?charavideo=&key=&tol=&vw=) ---- */
if(P.get('charavideo')){
  const v=document.createElement('video');
  v.src=P.get('charavideo');
  v.muted=true;v.loop=true;v.playsInline=true;v.setAttribute('playsinline','');v.crossOrigin='anonymous';
  const cv=document.getElementById('characanvas');
  cv.classList.add('onv');
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  const kh=(P.get('key')||'00ff00').replace('#','');
  let kr=parseInt(kh.substr(0,2),16),kg=parseInt(kh.substr(2,2),16),kb=parseInt(kh.substr(4,2),16);
  let tol=parseInt(P.get('tol')||'110');
  const vwf=Math.min(1,Math.max(.2,parseFloat(P.get('vw')||'1')));
  let sx=0,sw=0;
  v.addEventListener('loadedmetadata',()=>{
    sw=v.videoWidth*vwf;sx=(v.videoWidth-sw)/2;
    cv.width=sw;cv.height=v.videoHeight;
  });
  function draw(){
    if(v.readyState>=2&&cv.width>0){
      ctx.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const f=ctx.getImageData(0,0,cv.width,cv.height),d=f.data;
      let dc=1;
      if(kr>=kg&&kr>=kb)dc=0; else if(kb>=kr&&kb>=kg)dc=2;
      const o1=(dc+1)%3,o2=(dc+2)%3,karr=[kr,kg,kb];
      const keyDom=karr[dc]-Math.max(karr[o1],karr[o2]);
      if(keyDom>10){
        const tHigh=keyDom*.55*(110/Math.max(tol,20));
        const tLow=tHigh*.55;
        for(let i=0;i<d.length;i+=4){
          const pd=d[i+dc],pm=Math.max(d[i+o1],d[i+o2]);
          const dom=pd-pm;
          if(dom>=tHigh){d[i+3]=0;}
          else if(dom>tLow){d[i+3]=255*(1-(dom-tLow)/(tHigh-tLow));d[i+dc]=pm;}
          else if(dom>0){d[i+dc]=pm;}
        }
      }else{
        for(let i=0;i<d.length;i+=4){
          const dr=d[i]-kr,dg=d[i+1]-kg,db=d[i+2]-kb;
          const dist=Math.sqrt(dr*dr+dg*dg+db*db);
          if(dist<tol){d[i+3]=0;}
          else if(dist<tol*1.35){d[i+3]=(dist-tol)/(tol*.35)*255;}
        }
      }
      ctx.putImageData(f,0,0);
    }
    requestAnimationFrame(draw);
  }
  /* デバッグ(?debug=1) */
  if(P.get('debug')){
    const dbg=document.createElement('div');dbg.id='kdebug';
    dbg.innerHTML='<span id="kdinfo"></span><br><button id="kdm">tol−15</button><button id="kdp">tol+15</button>'+
      '<div id="kdhint">キャラ以外の残った背景色をタップ→その色がkeyになる。決まったらURLに key=/tol= を書き写す</div>';
    stage.appendChild(dbg);
    const info=()=>{document.getElementById('kdinfo').textContent=
      'key='+[kr,kg,kb].map(x=>x.toString(16).padStart(2,'0')).join('')+' tol='+tol;};
    info();
    document.getElementById('kdm').onclick=()=>{tol=Math.max(20,tol-15);info();};
    document.getElementById('kdp').onclick=()=>{tol+=15;info();};
    cv.addEventListener('click',e=>{
      const r=cv.getBoundingClientRect();
      const scale=Math.min(r.width/cv.width,r.height/cv.height);
      const ox=(r.width-cv.width*scale)/2,oy=(r.height-cv.height*scale);
      const x=Math.floor((e.clientX-r.left-ox)/scale),y=Math.floor((e.clientY-r.top-oy)/scale);
      if(x<0||y<0||x>=cv.width||y>=cv.height)return;
      const t=document.createElement('canvas');t.width=cv.width;t.height=cv.height;
      const tc=t.getContext('2d');
      tc.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const px=tc.getImageData(x,y,1,1).data;
      kr=px[0];kg=px[1];kb=px[2];info();
    });
  }
  const ts=document.getElementById('tapstart');
  v.play().catch(()=>{
    ts.classList.add('show');
    ts.addEventListener('click',()=>{v.play();ts.classList.remove('show');},{once:true});
  });
  draw();
}
</script>
</body>
