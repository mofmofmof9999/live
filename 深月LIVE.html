  /* 読みやすさ用のグラデーション */
  #stage::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:linear-gradient(180deg,rgba(10,5,25,.55) 0%,transparent 18%,transparent 62%,rgba(10,5,25,.72) 100%);}
  /* ===== 星のきらめき ===== */
  .star{position:absolute;z-index:3;color:#e8dcff;pointer-events:none;
    animation:twinkle 3s ease-in-out infinite;text-shadow:0 0 6px #cbb6ff;}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.8);}50%{opacity:.9;transform:scale(1.15);}}
  /* ===== 上部バー ===== */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:center;gap:8px;padding:14px 12px;}
  #hostchip{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.45);
    border:1px solid rgba(216,181,106,.55);border-radius:999px;padding:4px 6px 4px 4px;backdrop-filter:blur(6px);}
  #hostchip img{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);}
  #hostname{color:#fff;font-size:13px;font-weight:700;line-height:1.1;}
  #hostsub{color:#d9ccf5;font-size:10px;}
  #followbtn{background:linear-gradient(135deg,#8a63d2,#5d3fa8);color:#fff;border:none;
    font-size:12px;font-weight:700;border-radius:999px;padding:7px 14px;margin-left:2px;}
  #followbtn.done{background:rgba(255,255,255,.18);}
  #viewers{margin-left:auto;display:flex;align-items:center;gap:6px;}
  #viewers .pill{background:rgba(0,0,0,.45);color:#fff;font-size:11px;border-radius:8px;
    padding:5px 8px;backdrop-filter:blur(6px);}

    background:rgba(0,0,0,.6);padding:2px 8px;border-radius:999px;backdrop-filter:blur(4px);}

  #heartbtn:active{transform:scale(.85);}

  /* ===== 浮かぶハート&星 ===== */
  .float{position:absolute;z-index:9;pointer-events:none;font-size:24px;
    animation:floatup 2.6s ease-out forwards;filter:drop-shadow(0 0 5px rgba(255,120,170,.6));}
  @keyframes floatup{
    0%{opacity:0;transform:translateY(0) scale(.5);}

  #chara{position:absolute;left:50%;bottom:0;z-index:1;width:100%;max-height:100%;
    object-fit:contain;object-position:bottom;display:none;
    transform:translateX(-50%);transform-origin:bottom center;}
  #chara.on{display:block;animation:charabreathe 8s ease-in-out infinite;}
  @keyframes charabreathe{
    0%,100%{transform:translateX(-50%) translateY(0) scale(1);}
    45%{transform:translateX(-50%) translateY(-9px) scale(1.01);}
    58%{transform:translateX(-50%) translateY(-9px) scale(1.01);}
  }
  @keyframes bgdrift{from{transform:scale(1.0);}to{transform:scale(1.035);}}
  /* ===== 動画キャラレイヤー(クロマキー合成) ===== */
  #characanvas{position:absolute;left:50%;bottom:0;z-index:1;width:100%;max-height:100%;
    object-fit:contain;object-position:bottom;display:none;transform:translateX(-50%);}
  #characanvas.onv{display:block;}
  #tapstart{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);color:#fff;font-size:15px;font-weight:700;}

  #kdhint{color:#fff;margin-top:5px;font-size:10px;line-height:1.4;}

const cbox=document.getElementById('comments');

  let cls='cmt',text;

    '<div class="t">'+text+'</div></div>';
  cbox.appendChild(d);
  while(cbox.children.length>7)cbox.removeChild(cbox.firstChild);
}
setInterval(addComment,1600);
addComment();addComment();

/* ---- 浮かぶハート ---- */
const symbols=["💜","💜","🤍","✨","🌙","💗"];
function heart(){
  const h=document.createElement('span');
  h.className='float';
  h.textContent=symbols[Math.floor(Math.random()*symbols.length)];
  h.style.right=(14+Math.random()*36)+'px';
  h.style.bottom=(120+Math.random()*30)+'px';
  h.style.fontSize=(18+Math.random()*14)+'px';
  stage.appendChild(h);
  setTimeout(()=>h.remove(),2700);
}
function burst(n){for(let i=0;i<n;i++)setTimeout(heart,i*140);}
setInterval(()=>{if(Math.random()<.75)heart();},700);

/* ---- タップでハート ---- */
let likes=32000;
const lc=document.getElementById('likecount');
function fmt(n){return n>=10000?(n/10000).toFixed(1)+'万':n.toLocaleString();}
document.getElementById('heartbtn').addEventListener('click',()=>{burst(4);likes+=Math.floor(Math.random()*5+3);lc.textContent=fmt(likes);});
stage.addEventListener('dblclick',()=>burst(5));

/* ---- 視聴者数のゆらぎ ---- */
let viewers=1024;
const vc=document.getElementById('vcount');
setInterval(()=>{
  viewers+=Math.floor(Math.random()*17-6);
  if(viewers<900)viewers=900+Math.floor(Math.random()*30);
  vc.textContent=viewers.toLocaleString();
  likes+=Math.floor(Math.random()*8);lc.textContent=fmt(likes);
},2200);

/* ---- フォローボタン ---- */
const fb=document.getElementById('followbtn');
fb.addEventListener('click',()=>{fb.textContent='フォロー中';fb.classList.add('done');burst(6);});

/* ---- レイヤー分離モード(?bg=xxx.jpg&chara=xxx.png) ---- */
const P=new URLSearchParams(location.search);
const bgEl=document.getElementById('bg');
if(P.get('bg')){bgEl.style.backgroundImage='url("'+P.get('bg')+'")';}
if(P.get('chara')){
  const c=document.getElementById('chara');
  c.src=P.get('chara');c.classList.add('on');
  bgEl.style.animation='bgdrift 30s ease-in-out infinite alternate';
}

/* ---- 動画キャラモード(?charavideo=xxx.mp4&key=00ff00&tol=110) ---- */
if(P.get('charavideo')){
  const v=document.createElement('video');
  v.src=P.get('charavideo');
  v.muted=true;v.loop=true;v.playsInline=true;v.setAttribute('playsinline','');v.crossOrigin='anonymous';
  const cv=document.getElementById('characanvas');
  cv.classList.add('onv');
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  const kh=(P.get('key')||'00ff00').replace('#','');
  let kr=parseInt(kh.substr(0,2),16),kg=parseInt(kh.substr(2,2),16),kb=parseInt(kh.substr(4,2),16);
  let tol=parseInt(P.get('tol')||'110');
  const vwf=Math.min(1,Math.max(.2,parseFloat(P.get('vw')||'1')));
  let sx=0,sw=0;
  v.addEventListener('loadedmetadata',()=>{
    sw=v.videoWidth*vwf;sx=(v.videoWidth-sw)/2;
    cv.width=sw;cv.height=v.videoHeight;
  });
  function draw(){
    if(v.readyState>=2&&cv.width>0){
      ctx.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const f=ctx.getImageData(0,0,cv.width,cv.height),d=f.data;
      /* 優勢度方式: キー色の最強チャンネルが他よりどれだけ強いかで判定 */
      let dc=1;
      if(kr>=kg&&kr>=kb)dc=0; else if(kb>=kr&&kb>=kg)dc=2;
      const o1=(dc+1)%3,o2=(dc+2)%3,karr=[kr,kg,kb];
      const keyDom=karr[dc]-Math.max(karr[o1],karr[o2]);
      if(keyDom>10){
        const tHigh=keyDom*.55*(110/Math.max(tol,20));
        const tLow=tHigh*.55;
        for(let i=0;i<d.length;i+=4){
          const pd=d[i+dc],pm=Math.max(d[i+o1],d[i+o2]);
          const dom=pd-pm;
          if(dom>=tHigh){d[i+3]=0;}
          else if(dom>tLow){d[i+3]=255*(1-(dom-tLow)/(tHigh-tLow));d[i+dc]=pm;}
          else if(dom>0){d[i+dc]=pm;} /* 縁の色かぶりを自動補正 */
        }
      }else{
        /* キー色に優勢チャンネルがない場合は旧・色距離方式 */
        for(let i=0;i<d.length;i+=4){
          const dr=d[i]-kr,dg=d[i+1]-kg,db=d[i+2]-kb;
          const dist=Math.sqrt(dr*dr+dg*dg+db*db);
          if(dist<tol){d[i+3]=0;}
          else if(dist<tol*1.35){d[i+3]=(dist-tol)/(tol*.35)*255;}
        }
      }
      ctx.putImageData(f,0,0);
    }
    requestAnimationFrame(draw);
  }
  /* ---- デバッグモード(?debug=1): 残った緑をタップしてkey色を採取 ---- */
  if(P.get('debug')){
    const dbg=document.createElement('div');dbg.id='kdebug';
    dbg.innerHTML='<span id="kdinfo"></span><br><button id="kdm">tol−15</button><button id="kdp">tol+15</button>'+
      '<div id="kdhint">キャラ以外の残った緑をタップ→その色がkeyになる。決まったらURLに key=/tol= を書き写す</div>';
    stage.appendChild(dbg);
    const info=()=>{document.getElementById('kdinfo').textContent=
      'key='+[kr,kg,kb].map(x=>x.toString(16).padStart(2,'0')).join('')+' tol='+tol;};
    info();
    document.getElementById('kdm').onclick=()=>{tol=Math.max(20,tol-15);info();};
    document.getElementById('kdp').onclick=()=>{tol+=15;info();};
    cv.addEventListener('click',e=>{
      const r=cv.getBoundingClientRect();
      const scale=Math.min(r.width/cv.width,r.height/cv.height);
      const ox=(r.width-cv.width*scale)/2,oy=(r.height-cv.height*scale);
      const x=Math.floor((e.clientX-r.left-ox)/scale),y=Math.floor((e.clientY-r.top-oy)/scale);
      if(x<0||y<0||x>=cv.width||y>=cv.height)return;
      const t=document.createElement('canvas');t.width=cv.width;t.height=cv.height;
      const tc=t.getContext('2d');
      tc.drawImage(v,sx,0,sw,v.videoHeight,0,0,cv.width,cv.height);
      const px=tc.getImageData(x,y,1,1).data;
      kr=px[0];kg=px[1];kb=px[2];info();
    });
  }
  const ts=document.getElementById('tapstart');
  v.play().catch(()=>{
    ts.classList.add('show');
    ts.addEventListener('click',()=>{v.play();ts.classList.remove('show');},{once:true});
  });
  draw();
  bgEl.style.animation='bgdrift 30s ease-in-out infinite alternate';
}
</script>
